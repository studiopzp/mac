name: Run macOS in Cloud
on: 
  workflow_dispatch:

jobs:
  run-macos:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run macOS Container
      run: |
        # 1. Uruchomienie macOS z dyskiem 50 GB
        docker run -d --name macos -p 8006:8006 --device=/dev/kvm --cap-add=NET_ADMIN -e DISK_SIZE=50G dockurr/macos
        
        # 2. Odczekanie 15 sekund na uruchomienie sieci wewnątrz Dockera
        sleep 15
        
        # 3. Wygenerowanie klucza SSH (wymagane do bezpiecznego połączenia tunelowego)
        ssh-keygen -t rsa -N "" -f ~/.ssh/id_rsa
        
        # 4. Uruchomienie tunelu dla portu 8006 za pomocą localhost.run
        echo "=== TWÓJ LINK DO PULPITU MACOS POJAWI SIĘ PONIŻEJ ==="
        ssh -R 80:localhost:8006 nokey@localhost.run
